<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyrhythmic Metronome</title>
    <link rel="stylesheet" href="main.css">
</head>
<header>
    <nav>
        <ul>
            <li><a class="nav-link" href="">Home</a></li>
            <li><a class="nav-link" href="">Me</a></li>
        </ul>
    </nav>
</header>
<body>
    <div class="metronome-container">
        <h1>Polyrhythmic Metronome</h1>
        
        <div class="controls">
                <div class="bpm-control">
                    <label for="bpm-input">Main BPM:</label>
                    <input type="number" id="bpm-input" min="1" max="300" value="120">
                    <span id="bpm-display">120</span>
                </div>
                
                <div class="polyrhythm-control">
                    <div class="control-group">
                        <label for="ratio">Ratio:</label>
                        <input type="number" id="pulse" placeholder="4" value="4" min="1" max="20">
                        <span>:</span>
                        <input type="number" id="polyrhythm" placeholder="3" value="3" min="1" max="20">
                    </div>
                    <div class="control-group">
                        <label for="main-subdivision">Pulse Subdivision:</label>
                        <input type="number" id="main-subdivision" min="1" max="12" value="1">
                    </div>
                    <div class="control-group">
                        <label for="secondary-subdivision">Polyrhythm Subdivision:</label>
                        <input type="number" id="secondary-subdivision" min="1" max="12" value="1">
                    </div>
                </div>
            
            
            <div class="volume-control">
                <label for="volume-slider">Volume:</label>
                <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5">
            </div>
            
            <button id="start-stop-btn">Start</button>
        </div>
        <div class="swap-control">
            <label for="swap-btn">Swap Main/Secondary Tones:</label>
            <input type="checkbox" id="swap-btn">
        </div>
        <div class="visualization">
            <p>Pulse</p>
            <div class="beat-container">
                <div class="dots" id="main-dots"></div>
            </div>
            <p>Polyrhythm: <span id="secondary-bpm-display"></span></p>
            <div class="beat-container">
                <div class="dots" id="secondary-dots"></div>
            </div>
        </div>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
